name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "NexQ ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Upload updater artifacts and generate latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          TAG="$RELEASE_TAG"
          VERSION="${TAG#v}"

          # Search for .nsis.zip recursively in the target directory
          echo "Searching for .nsis.zip..."
          NSIS_ZIP=$(find src-tauri/target/release -name "*.nsis.zip" -type f 2>/dev/null | head -1)

          if [ -z "$NSIS_ZIP" ]; then
            echo "WARNING: No .nsis.zip found. Listing bundle directory contents:"
            find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle directory found"
            echo "Skipping updater JSON upload."
            exit 0
          fi

          echo "Found: $NSIS_ZIP"

          SIG_FILE="${NSIS_ZIP}.sig"
          if [ ! -f "$SIG_FILE" ]; then
            echo "WARNING: No .sig file found at $SIG_FILE"
            exit 0
          fi

          # Upload .nsis.zip
          echo "Uploading $(basename "$NSIS_ZIP")..."
          gh release upload "$TAG" "$NSIS_ZIP" --clobber

          # Read signature and generate latest.json
          SIGNATURE=$(cat "$SIG_FILE")
          NSIS_NAME=$(basename "$NSIS_ZIP")

          printf '{\n  "version": "%s",\n  "notes": "See https://github.com/%s/blob/main/CHANGELOG.md for details.",\n  "pub_date": "%s",\n  "platforms": {\n    "windows-x86_64": {\n      "signature": "%s",\n      "url": "https://github.com/%s/releases/download/%s/%s"\n    }\n  }\n}\n' \
            "$VERSION" "$REPO_SLUG" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$SIGNATURE" "$REPO_SLUG" "$TAG" "$NSIS_NAME" \
            > latest.json

          echo "Generated latest.json:"
          cat latest.json

          echo "Uploading latest.json..."
          gh release upload "$TAG" latest.json --clobber

          echo "Done! Updater artifacts uploaded."
