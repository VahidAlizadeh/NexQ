name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "NexQ ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Upload updater artifacts and generate latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPO_SLUG: ${{ github.repository }}
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const { execFileSync } = require('child_process');

            const tag = process.env.RELEASE_TAG;
            const version = tag.replace(/^v/, '');
            const repo = process.env.REPO_SLUG;
            const bundleDir = path.join('src-tauri', 'target', 'release', 'bundle', 'nsis');

            const files = fs.readdirSync(bundleDir);
            const nsisZip = files.find(f => f.endsWith('.nsis.zip'));
            if (!nsisZip) { console.error('No .nsis.zip found in ' + bundleDir); process.exit(1); }

            const nsisZipPath = path.join(bundleDir, nsisZip);
            const sigPath = nsisZipPath + '.sig';
            if (!fs.existsSync(sigPath)) { console.error('No .sig at ' + sigPath); process.exit(1); }

            console.log('Uploading ' + nsisZip + '...');
            execFileSync('gh', ['release', 'upload', tag, nsisZipPath, '--clobber'], { stdio: 'inherit' });

            const signature = fs.readFileSync(sigPath, 'utf8').trim();
            const latest = {
              version: version,
              notes: 'See https://github.com/' + repo + '/blob/main/CHANGELOG.md for details.',
              pub_date: new Date().toISOString(),
              platforms: {
                'windows-x86_64': {
                  signature: signature,
                  url: 'https://github.com/' + repo + '/releases/download/' + tag + '/' + nsisZip
                }
              }
            };

            fs.writeFileSync('latest.json', JSON.stringify(latest, null, 2));
            console.log('Uploading latest.json...');
            execFileSync('gh', ['release', 'upload', tag, 'latest.json', '--clobber'], { stdio: 'inherit' });
            console.log('Done!');
          "
