<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexQ Demo - Live Meeting</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0c0c14;
    color: #e4e4e7;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .overlay-window {
    width: 520px; height: 620px;
    background: rgba(14, 14, 22, 0.96);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  .overlay-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .grip-icon { color: rgba(255,255,255,0.2); font-size: 10px; }
  .meeting-title { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.85); }
  .rec-badge {
    display: flex; align-items: center; gap: 4px;
    background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.1);
    border-radius: 12px; padding: 2px 8px;
  }
  .rec-dot { width: 5px; height: 5px; border-radius: 50%; background: #ef4444; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .rec-text { font-size: 9px; font-weight: 700; color: #ef4444; letter-spacing: 0.5px; }
  .elapsed { font-size: 11px; color: rgba(255,255,255,0.35); font-variant-numeric: tabular-nums; font-weight: 500; }
  .mode-badge { font-size: 8px; font-weight: 700; letter-spacing: 0.8px; padding: 2px 6px; border-radius: 4px; background: rgba(74,108,247,0.12); color: #4a6cf7; }
  .scenario-badge { font-size: 9px; color: rgba(255,255,255,0.35); padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.04); }
  .header-right { display: flex; align-items: center; gap: 2px; }
  .header-btn {
    width: 28px; height: 28px; border-radius: 6px; border: none; cursor: pointer;
    background: transparent; color: rgba(255,255,255,0.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; transition: all 0.15s;
  }
  .header-btn.active { background: rgba(74,108,247,0.1); color: #4a6cf7; }
  .end-btn {
    border: 1px solid rgba(239,68,68,0.2); background: rgba(239,68,68,0.08);
    color: #ef4444; font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 6px; cursor: pointer; margin-left: 4px;
  }
  .main-content { display: flex; flex: 1; min-height: 0; }
  .transcript-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; border-right: 1px solid rgba(255,255,255,0.04); }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); flex-shrink: 0; }
  .panel-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: rgba(255,255,255,0.3); }
  .transcript-content { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 2px; }
  .transcript-line {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 4px 6px; border-radius: 6px;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.35s cubic-bezier(0.22,1,0.36,1), transform 0.35s cubic-bezier(0.22,1,0.36,1);
  }
  .transcript-line.visible { opacity: 1; transform: translateY(0); }
  .line-time { font-size: 10px; color: rgba(255,255,255,0.3); font-variant-numeric: tabular-nums; flex-shrink: 0; padding-top: 2px; min-width: 32px; }
  .line-speaker { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
  .speaker-you { background: rgba(16,185,129,0.15); color: #10b981; }
  .speaker-them { background: rgba(74,108,247,0.15); color: #4a6cf7; }
  .line-text { font-size: 12px; color: #d4d4d8; line-height: 1.5; }
  .translation-line {
    margin-left: 46px; padding: 2px 8px; font-size: 11px;
    color: rgba(168,139,250,0.8); border-left: 2px solid rgba(168,139,250,0.3);
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .translation-line.visible { opacity: 1; transform: translateY(0); }
  .ai-panel { width: 220px; display: flex; flex-direction: column; flex-shrink: 0; }
  .ai-tabs { display: flex; gap: 2px; padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); flex-shrink: 0; }
  .ai-tab { font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 6px; cursor: pointer; border: none; background: transparent; color: rgba(255,255,255,0.35); }
  .ai-tab.active { background: rgba(74,108,247,0.1); color: #4a6cf7; }
  .ai-content { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .question-card {
    border: 1px solid rgba(6,182,212,0.15); background: rgba(6,182,212,0.05);
    border-radius: 8px; padding: 10px; opacity: 0; transform: scale(0.97);
    transition: opacity 0.4s cubic-bezier(0.22,1,0.36,1), transform 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .question-card.visible { opacity: 1; transform: scale(1); }
  .question-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .question-icon { font-size: 14px; color: #06b6d4; }
  .question-label { font-size: 9px; font-weight: 700; color: #06b6d4; text-transform: uppercase; letter-spacing: 0.5px; }
  .question-pulse { width: 6px; height: 6px; border-radius: 50%; background: #06b6d4; animation: qpulse 1.5s infinite; }
  @keyframes qpulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .question-text { font-size: 11px; color: rgba(255,255,255,0.85); line-height: 1.4; font-weight: 500; }
  .assist-btn {
    margin-top: 8px; display: inline-flex; align-items: center; gap: 4px;
    background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.2);
    color: #06b6d4; font-size: 10px; font-weight: 600;
    padding: 4px 10px; border-radius: 6px; cursor: pointer;
  }
  .assist-btn.clicked { background: rgba(74,108,247,0.1); border-color: rgba(74,108,247,0.2); color: #4a6cf7; }
  .ai-response {
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
    border-radius: 8px; padding: 10px;
    opacity: 0; transform: translateY(6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .ai-response.visible { opacity: 1; transform: translateY(0); }
  .ai-response-header { display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
  .ai-badge { font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 4px; background: rgba(6,182,212,0.15); color: #06b6d4; }
  .ai-model { font-size: 9px; color: rgba(255,255,255,0.25); }
  .ai-response-text { font-size: 11px; color: rgba(255,255,255,0.75); line-height: 1.6; }
  .ai-cursor { display: inline-block; width: 2px; height: 12px; background: #4a6cf7; margin-left: 2px; vertical-align: middle; animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  .translate-toggle { display: flex; align-items: center; gap: 6px; padding: 4px 8px; opacity: 0; transition: opacity 0.3s ease; }
  .translate-toggle.visible { opacity: 1; }
  .toggle-track { width: 28px; height: 14px; border-radius: 7px; background: rgba(255,255,255,0.1); position: relative; transition: background 0.3s; }
  .toggle-track.on { background: rgba(168,139,250,0.4); }
  .toggle-knob { width: 10px; height: 10px; border-radius: 50%; background: #888; position: absolute; top: 2px; left: 2px; transition: all 0.3s; }
  .toggle-track.on .toggle-knob { left: 16px; background: #a78bfa; }
  .toggle-label { font-size: 9px; color: rgba(255,255,255,0.3); }
  .toggle-label.on { color: #a78bfa; }
  .lang-badge { font-size: 8px; color: rgba(168,139,250,0.6); padding: 1px 4px; background: rgba(168,139,250,0.08); border-radius: 3px; opacity: 0; transition: opacity 0.3s; }
  .lang-badge.visible { opacity: 1; }
  .overlay-footer { display: flex; align-items: center; justify-content: space-between; padding: 4px 12px; border-top: 1px solid rgba(255,255,255,0.04); flex-shrink: 0; }
  .status-item { display: flex; align-items: center; gap: 4px; font-size: 9px; color: rgba(255,255,255,0.3); }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; }
  .status-dot.green { background: #10b981; }
  .status-dot.blue { background: #4a6cf7; }
</style>
</head>
<body>
<div class="overlay-window" id="overlay">
  <div class="overlay-header">
    <div class="header-left">
      <span class="grip-icon">&#8942;&#8942;</span>
      <span class="meeting-title">Technical Interview</span>
      <div class="rec-badge"><div class="rec-dot"></div><span class="rec-text">REC</span></div>
      <span class="mode-badge">ONLINE</span>
      <span class="scenario-badge">Interview</span>
      <span class="elapsed" id="elapsed">02:14</span>
    </div>
    <div class="header-right">
      <div class="translate-toggle" id="translateToggle">
        <div class="toggle-track" id="toggleTrack"><div class="toggle-knob"></div></div>
        <span class="toggle-label" id="toggleLabel">Translate</span>
        <span class="lang-badge" id="langBadge">ZH</span>
      </div>
      <button class="header-btn">&#128278;</button>
      <button class="header-btn active">&#129302;</button>
      <button class="end-btn">End</button>
    </div>
  </div>
  <div class="main-content">
    <div class="transcript-panel">
      <div class="panel-header">
        <span class="panel-label">Transcript</span>
        <span style="font-size:9px;color:rgba(255,255,255,0.2);">&#128269;</span>
      </div>
      <div class="transcript-content" id="transcriptContent"></div>
    </div>
    <div class="ai-panel">
      <div class="ai-tabs">
        <button class="ai-tab active">Response</button>
        <button class="ai-tab">Questions</button>
      </div>
      <div class="ai-content" id="aiContent"></div>
    </div>
  </div>
  <div class="overlay-footer">
    <div class="status-item"><div class="status-dot green"></div><span>Deepgram</span></div>
    <div class="status-item"><div class="status-dot blue"></div><span>GPT-4o</span></div>
    <div class="status-item"><div class="status-dot green"></div><span>Mic &#9679; System</span></div>
  </div>
</div>

<script>
const transcriptData = [
  { time: '02:14', speaker: 'them', text: "Let's move on to the technical portion. Can you walk me through how you'd design a real-time data pipeline?" },
  { time: '02:22', speaker: 'you', text: "Sure. I'd start with an event-driven architecture using Kafka as the message broker." },
  { time: '02:31', speaker: 'them', text: "Good. How would you handle backpressure if the consumers can't keep up?" },
  { time: '02:38', speaker: 'you', text: "I'd implement consumer group scaling combined with a dead letter queue for failures." },
  { time: '02:47', speaker: 'them', text: "What about exactly-once delivery guarantees? How would you approach that?" },
  { time: '02:55', speaker: 'you', text: "Kafka supports idempotent producers and transactional writes. Combined with consumer offset commits..." },
  { time: '03:04', speaker: 'them', text: "And how do you monitor the health of such a pipeline in production?" },
];
const translationData = [
  '那我们进入技术环节。你能介绍一下如何设计实时数据管道吗？',
  '好的。我会从事件驱动架构开始，使用 Kafka 作为消息代理。',
  '不错。如果消费者跟不上生产者的速度，你如何处理反压？',
  '我会结合消费者组扩展和死信队列来处理失败的消息。',
  'Kafka 的恰好一次交付保证呢？你会如何处理？',
  'Kafka 支持幂等生产者和事务写入。结合事务中提交偏移量...',
  '你在生产环境中如何监控这种管道的健康状况？',
];

const tc = document.getElementById('transcriptContent');
const ac = document.getElementById('aiContent');
const tt = document.getElementById('translateToggle');
const tTrack = document.getElementById('toggleTrack');
const tLabel = document.getElementById('toggleLabel');
const lBadge = document.getElementById('langBadge');
let elapsed = 134;
const elapsedEl = document.getElementById('elapsed');
setInterval(() => { elapsed++; const m = String(Math.floor(elapsed/60)).padStart(2,'0'); const s = String(elapsed%60).padStart(2,'0'); elapsedEl.textContent = m+':'+s; }, 1000);

let translationOn = false;

function addLine(data, idx) {
  const d = document.createElement('div');
  d.className = 'transcript-line';
  const timeSpan = document.createElement('span');
  timeSpan.className = 'line-time';
  timeSpan.textContent = data.time;
  const speakerSpan = document.createElement('span');
  speakerSpan.className = 'line-speaker ' + (data.speaker === 'you' ? 'speaker-you' : 'speaker-them');
  speakerSpan.textContent = data.speaker === 'you' ? 'You' : 'Them';
  const textSpan = document.createElement('span');
  textSpan.className = 'line-text';
  textSpan.textContent = data.text;
  d.appendChild(timeSpan);
  d.appendChild(speakerSpan);
  d.appendChild(textSpan);
  tc.appendChild(d);
  setTimeout(() => { d.classList.add('visible'); tc.scrollTop = tc.scrollHeight; }, 50);
  if (translationOn && translationData[idx]) {
    setTimeout(() => {
      const tl = document.createElement('div');
      tl.className = 'translation-line';
      tl.textContent = translationData[idx];
      tc.appendChild(tl);
      setTimeout(() => { tl.classList.add('visible'); tc.scrollTop = tc.scrollHeight; }, 50);
    }, 400);
  }
}

function enableTranslation() {
  translationOn = true;
  tt.classList.add('visible');
  tTrack.classList.add('on');
  tLabel.classList.add('on');
  tLabel.textContent = 'Translate';
  lBadge.classList.add('visible');
  const lines = tc.querySelectorAll('.transcript-line');
  lines.forEach((line, i) => {
    if (translationData[i] && (!line.nextElementSibling || !line.nextElementSibling.classList.contains('translation-line'))) {
      const tl = document.createElement('div');
      tl.className = 'translation-line';
      tl.textContent = translationData[i];
      line.after(tl);
      setTimeout(() => tl.classList.add('visible'), 100 + i * 150);
    }
  });
  setTimeout(() => { tc.scrollTop = tc.scrollHeight; }, 800);
}

function showQuestion() {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'qcard';
  const header = document.createElement('div');
  header.className = 'question-header';
  const icon = document.createElement('span');
  icon.className = 'question-icon';
  icon.textContent = '\u2753';
  const label = document.createElement('span');
  label.className = 'question-label';
  label.textContent = 'Question Detected';
  const dot = document.createElement('div');
  dot.className = 'question-pulse';
  header.appendChild(icon);
  header.appendChild(label);
  header.appendChild(dot);
  const text = document.createElement('div');
  text.className = 'question-text';
  text.textContent = '\u201CHow do you monitor the health of such a pipeline in production?\u201D';
  const btn = document.createElement('button');
  btn.className = 'assist-btn';
  btn.id = 'assistBtn';
  btn.textContent = '\u26A1 Assist';
  card.appendChild(header);
  card.appendChild(text);
  card.appendChild(btn);
  ac.insertBefore(card, ac.firstChild);
  setTimeout(() => card.classList.add('visible'), 50);
}

function clickAssist() {
  const btn = document.getElementById('assistBtn');
  if (btn) { btn.classList.add('clicked'); btn.textContent = '\u23F3 Generating...'; }
}

function showAIResponse() {
  const btn = document.getElementById('assistBtn');
  if (btn) btn.textContent = '\u2705 Answered';
  const resp = document.createElement('div');
  resp.className = 'ai-response';
  const rh = document.createElement('div');
  rh.className = 'ai-response-header';
  const badge = document.createElement('span');
  badge.className = 'ai-badge';
  badge.textContent = 'Assist';
  const model = document.createElement('span');
  model.className = 'ai-model';
  model.textContent = 'GPT-4o \u00B7 1.2s';
  rh.appendChild(badge);
  rh.appendChild(model);
  const rt = document.createElement('div');
  rt.className = 'ai-response-text';
  rt.id = 'aiText';
  resp.appendChild(rh);
  resp.appendChild(rt);
  ac.appendChild(resp);
  setTimeout(() => resp.classList.add('visible'), 50);

  const fullText = "Great question about monitoring! Key points:\n\n\u2022 Metrics: Track consumer lag, throughput, error rates with Prometheus + Grafana\n\u2022 Alerting: PagerDuty for lag exceeding thresholds\n\u2022 Distributed tracing: Jaeger for end-to-end latency tracking\n\u2022 Health checks: Broker health + ZK quorum monitoring\n\n\uD83D\uDCA1 Mention your hands-on experience with monitoring tools.";
  let ci = 0;
  const cursor = document.createElement('span');
  cursor.className = 'ai-cursor';

  function typeIt() {
    if (ci < fullText.length) {
      rt.textContent = fullText.substring(0, ci + 1);
      rt.appendChild(cursor);
      ci++;
      ac.scrollTop = ac.scrollHeight;
      setTimeout(typeIt, 15 + Math.random() * 20);
    } else {
      rt.textContent = fullText;
    }
  }
  typeIt();
}

// Timeline
const steps = [
  [600, () => addLine(transcriptData[0], 0)],
  [2200, () => addLine(transcriptData[1], 1)],
  [4000, () => addLine(transcriptData[2], 2)],
  [5800, () => addLine(transcriptData[3], 3)],
  [7800, () => enableTranslation()],
  [9800, () => addLine(transcriptData[4], 4)],
  [11800, () => addLine(transcriptData[5], 5)],
  [13800, () => addLine(transcriptData[6], 6)],
  [15000, () => showQuestion()],
  [16500, () => clickAssist()],
  [17500, () => showAIResponse()],
];
steps.forEach(([delay, fn]) => setTimeout(fn, delay));
</script>
</body>
</html>
