name: Feature Request
description: Suggest a feature for NexQ
labels: ["enhancement"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: What are you trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you envision this working?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
    validations:
      required: false
